services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/database:/app/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - FRONTEND_URL=http://localhost:5173
    healthcheck:
      test: ["CMD", "php", "artisan", "tinker", "--execute=echo 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
